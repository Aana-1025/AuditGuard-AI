spec_version: 1
name: AuditGuard
description: Deterministic expense-fraud auditing environment with scenario-based risk analysis.
type: space
runtime: fastapi
app: server.app:app
port: 8000
endpoints:
  reset: /reset
  step: /step
  state: /state
  schema: /schema
tasks:
  - id: easy
    title: Obvious Fraud Signals
    description: Catch clear violations, especially forbidden merchants and direct policy breaches.
  - id: medium
    title: Mixed Fraud Signals
    description: Handle combined evidence such as missing receipts and split-transaction behavior.
  - id: hard
    title: Subtle Fraud Patterns
    description: Identify low-visibility anomalies spread across transaction metadata and behavior.
